min_version: 2.1.4

pre-push:
  parallel: false
  jobs:
    - name: format
      fail_text: "make format changed files; stage, commit, and push again."
      run: |
        make format
        git diff --quiet || {
          echo >&2 "make format modified the working tree; commit those changes before pushing."
          git diff --stat >&2
          exit 1
        }

    - name: golangci-lint
      run: make lint

    - name: go test
      run: make test
